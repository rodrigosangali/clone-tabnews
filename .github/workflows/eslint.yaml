name: Automated EsLinting

on: pull_request

jobs:
  lint:
    name: EsLint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.12.1"

      - run: npm ci

      - run: npx eslint . --ext .js,.jsx,.ts,.tsx